<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Maths Practice</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bronze: #E07C4C;
            --bronze-light: #FFDAC6;
            --silver: #9BA4B5;
            --silver-light: #E2E8F0;
            --gold: #F4B940;
            --gold-light: #FFF0C4;
            --text: #2d3748;
            --text-light: #718096;
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.15), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 1rem;
            background: linear-gradient(135deg, #FFE5EC 0%, #FFF6E5 25%, #E8F5FF 50%, #F5E6FF 75%, #FFE5EC 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: var(--text);
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating bubbles container */
        .bubbles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0.6;
        }

        @keyframes float {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(calc(100vh + 100px)) rotate(360deg);
                opacity: 0;
            }
        }

        .bubble:nth-child(1) {
            width: 40px;
            height: 40px;
            left: 5%;
            background: linear-gradient(135deg, #FFB6C1, #FFC0CB);
            animation-duration: 12s;
            animation-delay: 0s;
        }

        .bubble:nth-child(2) {
            width: 25px;
            height: 25px;
            left: 15%;
            background: linear-gradient(135deg, #FFD93D, #FFE566);
            animation-duration: 15s;
            animation-delay: 2s;
        }

        .bubble:nth-child(3) {
            width: 50px;
            height: 50px;
            left: 25%;
            background: linear-gradient(135deg, #A7F3D0, #6EE7B7);
            animation-duration: 18s;
            animation-delay: 4s;
        }

        .bubble:nth-child(4) {
            width: 30px;
            height: 30px;
            left: 35%;
            background: linear-gradient(135deg, #C4B5FD, #A78BFA);
            animation-duration: 14s;
            animation-delay: 1s;
        }

        .bubble:nth-child(5) {
            width: 45px;
            height: 45px;
            left: 45%;
            background: linear-gradient(135deg, #93C5FD, #60A5FA);
            animation-duration: 16s;
            animation-delay: 3s;
        }

        .bubble:nth-child(6) {
            width: 35px;
            height: 35px;
            left: 55%;
            background: linear-gradient(135deg, #FBBF24, #F59E0B);
            animation-duration: 13s;
            animation-delay: 5s;
        }

        .bubble:nth-child(7) {
            width: 55px;
            height: 55px;
            left: 65%;
            background: linear-gradient(135deg, #F9A8D4, #F472B6);
            animation-duration: 17s;
            animation-delay: 2.5s;
        }

        .bubble:nth-child(8) {
            width: 28px;
            height: 28px;
            left: 75%;
            background: linear-gradient(135deg, #FCA5A5, #F87171);
            animation-duration: 14s;
            animation-delay: 4.5s;
        }

        .bubble:nth-child(9) {
            width: 42px;
            height: 42px;
            left: 85%;
            background: linear-gradient(135deg, #86EFAC, #4ADE80);
            animation-duration: 19s;
            animation-delay: 1.5s;
        }

        .bubble:nth-child(10) {
            width: 32px;
            height: 32px;
            left: 95%;
            background: linear-gradient(135deg, #FDE68A, #FCD34D);
            animation-duration: 15s;
            animation-delay: 3.5s;
        }

        .bubble:nth-child(11) {
            width: 38px;
            height: 38px;
            left: 10%;
            background: linear-gradient(135deg, #DDD6FE, #C4B5FD);
            animation-duration: 16s;
            animation-delay: 6s;
        }

        .bubble:nth-child(12) {
            width: 48px;
            height: 48px;
            left: 90%;
            background: linear-gradient(135deg, #FBCFE8, #F9A8D4);
            animation-duration: 20s;
            animation-delay: 7s;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            padding: 2rem 1rem;
            margin-bottom: 1rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FF6B9D 0%, #FFA34D 50%, #FFD93D 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            text-shadow: none;
        }

        .date-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .date-nav button {
            background: var(--card-bg);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .date-nav button:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .date-nav button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .current-date {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            min-width: 220px;
            background: var(--card-bg);
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .loading {
            text-align: center;
            padding: 3rem;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #FFE5EC;
            border-top-color: #FF6B9D;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            text-align: center;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 1.5rem;
            color: #c53030;
            box-shadow: var(--shadow);
        }

        .setup-instructions {
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: var(--shadow);
        }

        .setup-instructions h2 {
            margin-bottom: 1rem;
            color: var(--text);
        }

        .setup-instructions ol {
            margin-left: 1.5rem;
            line-height: 1.8;
        }

        .setup-instructions code {
            background: #FFF0F5;
            padding: 0.2rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.9rem;
        }

        .no-questions {
            text-align: center;
            padding: 3rem;
            background: var(--card-bg);
            border-radius: 1.5rem;
            box-shadow: var(--shadow);
        }

        .no-questions h2 {
            color: var(--text);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .no-questions p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .level-tabs {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .level-tab {
            padding: 1rem 2rem;
            border: none;
            border-radius: 2rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .level-tab.bronze {
            background: linear-gradient(135deg, #FFDAC6 0%, #FFE8DC 100%);
            color: #C25D30;
        }
        .level-tab.bronze.active, .level-tab.bronze:hover {
            background: linear-gradient(135deg, #E07C4C 0%, #F4A574 100%);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(224, 124, 76, 0.4);
        }

        .level-tab.silver {
            background: linear-gradient(135deg, #E2E8F0 0%, #F1F5F9 100%);
            color: #4A5568;
        }
        .level-tab.silver.active, .level-tab.silver:hover {
            background: linear-gradient(135deg, #9BA4B5 0%, #B8C4D4 100%);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(155, 164, 181, 0.4);
        }

        .level-tab.gold {
            background: linear-gradient(135deg, #FFF0C4 0%, #FFF8E1 100%);
            color: #B7860B;
        }
        .level-tab.gold.active, .level-tab.gold:hover {
            background: linear-gradient(135deg, #F4B940 0%, #FFD54F 100%);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(244, 185, 64, 0.4);
        }

        .questions-container {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .question-card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: var(--shadow);
            border-left: 5px solid var(--bronze);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .question-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 50px -10px rgba(0, 0, 0, 0.2);
        }

        .question-card.silver { border-left-color: var(--silver); }
        .question-card.gold { border-left-color: var(--gold); }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.25rem;
        }

        .question-number {
            font-size: 0.9rem;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #FF6B9D 0%, #FF8E72 100%);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.7;
            margin-bottom: 1.5rem;
            white-space: pre-wrap;
            color: var(--text);
        }

        .question-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .toggle-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .hint-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .toggle-btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .toggle-btn.hint-btn { 
            background: linear-gradient(135deg, #FFF0C4 0%, #FFEB99 100%);
            color: #B7860B;
        }
        .toggle-btn.hint-btn:hover, .toggle-btn.hint-btn.active { 
            background: linear-gradient(135deg, #FFD93D 0%, #FFE566 100%);
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255, 217, 61, 0.4);
        }

        .toggle-btn.answer-btn { 
            background: linear-gradient(135deg, #D1FAE5 0%, #A7F3D0 100%);
            color: #065F46;
        }
        .toggle-btn.answer-btn:hover, .toggle-btn.answer-btn.active { 
            background: linear-gradient(135deg, #34D399 0%, #6EE7B7 100%);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(52, 211, 153, 0.4);
        }

        .hint-box, .answer-box {
            margin-top: 1.25rem;
            padding: 1.25rem;
            border-radius: 1rem;
            display: none;
            white-space: pre-wrap;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .hint-box.visible, .answer-box.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hint-box {
            background: linear-gradient(135deg, #FFF9E6 0%, #FFF0C4 100%);
            border: 2px solid #FFD93D;
        }

        .answer-box {
            background: linear-gradient(135deg, #ECFDF5 0%, #D1FAE5 100%);
            border: 2px solid #34D399;
        }

        .hint-label, .answer-label {
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .hint-label { color: #B7860B; }
        .answer-label { color: #065F46; }

        .refresh-note {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 2.5rem;
            background: var(--card-bg);
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            display: inline-block;
            margin-left: 50%;
            transform: translateX(-50%);
        }

        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .question-card { padding: 1.25rem; }
            .level-tab { padding: 0.75rem 1.25rem; font-size: 1rem; }
            .toggle-buttons { flex-direction: column; align-items: stretch; }
            .toggle-btn { width: 100%; text-align: center; }
            .bubble { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <!-- Floating bubbles -->
    <div class="bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <div class="container">
        <header>
            <h1>📐 Daily Maths Practice</h1>
            <div class="date-nav">
                <button id="prev-day" title="Previous day">◀</button>
                <span class="current-date" id="current-date"></span>
                <button id="next-day" title="Next day">▶</button>
            </div>
        </header>

        <main id="main-content">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading questions...</p>
            </div>
        </main>

        <p class="refresh-note">Questions update automatically from the teacher's spreadsheet</p>
    </div>

    <script>
        // ============================================================
        // CONFIGURATION - UPDATE THIS WITH YOUR GOOGLE SHEET ID
        // ============================================================
        // To find your Sheet ID, look at your Google Sheet URL:
        // https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID_IS_HERE/edit
        // Copy the long string of letters and numbers and paste it below:
        
        const GOOGLE_SHEET_ID = '1OvL9xrAi4eTxll-Xnfy-6U-7utBf-bfaU24IAwxMEhQ';
        
        // Sheet name (tab name) - default is 'Sheet1', change if different
        const SHEET_NAME = 'Sheet1';
        
        // ============================================================
        // END CONFIGURATION
        // ============================================================

        // All questions data (loaded from sheet)
        let allQuestions = [];
        
        // Current viewing date
        let currentDate = new Date();
        currentDate.setHours(0, 0, 0, 0);
        
        // Today's date for comparison
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        // Currently selected level
        let currentLevel = 'bronze';

        // Available dates (dates that have questions)
        let availableDates = new Set();

        // Format date for display
        function formatDate(date) {
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            return date.toLocaleDateString('en-GB', options);
        }

        // Format date for comparison (YYYY-MM-DD)
        function getDateKey(date) {
            return date.toISOString().split('T')[0];
        }

        // Parse date from various formats
        function parseDate(dateStr) {
            if (!dateStr) return null;
            
            // Try different formats
            // Format: DD/MM/YYYY
            let match = dateStr.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
            if (match) {
                return new Date(match[3], match[2] - 1, match[1]);
            }
            
            // Format: YYYY-MM-DD
            match = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})$/);
            if (match) {
                return new Date(match[1], match[2] - 1, match[3]);
            }
            
            // Format: DD-MM-YYYY
            match = dateStr.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
            if (match) {
                return new Date(match[3], match[2] - 1, match[1]);
            }
            
            // Try native parsing as fallback
            const parsed = new Date(dateStr);
            if (!isNaN(parsed)) return parsed;
            
            return null;
        }

        // Normalise level string
        function normaliseLevel(level) {
            if (!level) return null;
            const l = level.toString().toLowerCase().trim();
            if (l.includes('bronze') || l === '1') return 'bronze';
            if (l.includes('silver') || l === '2') return 'silver';
            if (l.includes('gold') || l === '3') return 'gold';
            return null;
        }

        // Fetch and parse Google Sheet data
        async function fetchQuestions() {
            if (GOOGLE_SHEET_ID === 'YOUR_SHEET_ID_HERE') {
                showSetupInstructions();
                return;
            }

            // Try CSV export first (works better with school accounts)
            const csvUrl = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/export?format=csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
            
            try {
                const response = await fetch(csvUrl);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: Make sure the sheet is shared as "Anyone with the link"`);
                }
                
                const text = await response.text();
                
                if (text.includes('<!DOCTYPE html>') || text.includes('<html')) {
                    throw new Error('Sheet not accessible. Please check sharing settings: Share → Anyone with the link');
                }
                
                // Parse CSV
                const rows = parseCSV(text);
                
                if (rows.length < 2) {
                    throw new Error('Sheet appears empty or has no data rows');
                }

                // Find column indices from header row
                const headers = rows[0].map(h => h.toLowerCase().trim());
                const dateCol = headers.findIndex(h => h.includes('date'));
                const levelCol = headers.findIndex(h => h.includes('level'));
                const questionCol = headers.findIndex(h => h.includes('question'));
                const answerCol = headers.findIndex(h => h.includes('answer'));
                const hintCol = headers.findIndex(h => h.includes('hint'));
                const imageCol = headers.findIndex(h => h.includes('image'));

                if (dateCol === -1 || questionCol === -1) {
                    throw new Error('Could not find Date and Question columns. Check header row.');
                }

                // Parse questions
                allQuestions = [];
                availableDates = new Set();

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || row.length === 0) continue;

                    const dateVal = row[dateCol];
                    const date = parseDate(dateVal);
                    const level = normaliseLevel(row[levelCol]);
                    const question = row[questionCol];
                    const answer = answerCol >= 0 ? row[answerCol] : '';
                    const hint = hintCol >= 0 ? row[hintCol] : '';
                    const image = imageCol >= 0 ? row[imageCol] : '';

                    if (date && level && question && question.trim()) {
                        const dateKey = getDateKey(date);
                        allQuestions.push({
                            date: dateKey,
                            level,
                            question: question.toString().trim(),
                            answer: (answer || '').toString().trim(),
                            hint: (hint || '').toString().trim(),
                            image: (image || '').toString().trim()
                        });
                        availableDates.add(dateKey);
                    }
                }

                if (allQuestions.length === 0) {
                    throw new Error('No valid questions found. Make sure each row has Date, Level, and Question filled in.');
                }

                // Find most recent date with questions (up to today)
                const sortedDates = Array.from(availableDates).sort().reverse();
                const todayKey = getDateKey(today);
                const recentDate = sortedDates.find(d => d <= todayKey) || sortedDates[0];
                
                if (recentDate) {
                    currentDate = new Date(recentDate + 'T00:00:00');
                }

                render();

            } catch (error) {
                console.error('Error fetching questions:', error);
                showError(error.message);
            }
        }
        
        // Parse CSV text into rows
        function parseCSV(text) {
            const rows = [];
            let currentRow = [];
            let currentCell = '';
            let insideQuotes = false;
            
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];
                
                if (insideQuotes) {
                    if (char === '"' && nextChar === '"') {
                        currentCell += '"';
                        i++; // Skip next quote
                    } else if (char === '"') {
                        insideQuotes = false;
                    } else {
                        currentCell += char;
                    }
                } else {
                    if (char === '"') {
                        insideQuotes = true;
                    } else if (char === ',') {
                        currentRow.push(currentCell);
                        currentCell = '';
                    } else if (char === '\n' || (char === '\r' && nextChar === '\n')) {
                        currentRow.push(currentCell);
                        rows.push(currentRow);
                        currentRow = [];
                        currentCell = '';
                        if (char === '\r') i++; // Skip \n after \r
                    } else if (char !== '\r') {
                        currentCell += char;
                    }
                }
            }
            
            // Don't forget last cell/row
            if (currentCell || currentRow.length > 0) {
                currentRow.push(currentCell);
                rows.push(currentRow);
            }
            
            return rows;
        }

        // Get questions for a specific date and level
        function getQuestions(dateKey, level) {
            return allQuestions.filter(q => q.date === dateKey && q.level === level);
        }

        // Update navigation buttons
        function updateNavigation() {
            const prevBtn = document.getElementById('prev-day');
            const nextBtn = document.getElementById('next-day');
            
            prevBtn.disabled = false;
            
            const currentDateStr = getDateKey(currentDate);
            const todayStr = getDateKey(today);
            nextBtn.disabled = currentDateStr >= todayStr;
            
            document.getElementById('current-date').textContent = formatDate(currentDate);
        }

        // Render the main content
        function render() {
            updateNavigation();
            
            const dateKey = getDateKey(currentDate);
            const questions = getQuestions(dateKey, currentLevel);
            const main = document.getElementById('main-content');
            
            const hasAnyQuestionsForDate = allQuestions.some(q => q.date === dateKey);
            
            if (!hasAnyQuestionsForDate) {
                main.innerHTML = `
                    <div class="no-questions">
                        <h2>No questions for this day</h2>
                        <p>Try going back to a previous day, or check back later.</p>
                    </div>
                `;
                return;
            }

            main.innerHTML = `
                <div class="level-tabs">
                    <button class="level-tab bronze ${currentLevel === 'bronze' ? 'active' : ''}" data-level="bronze">
                        🥉 Bronze
                    </button>
                    <button class="level-tab silver ${currentLevel === 'silver' ? 'active' : ''}" data-level="silver">
                        🥈 Silver
                    </button>
                    <button class="level-tab gold ${currentLevel === 'gold' ? 'active' : ''}" data-level="gold">
                        🥇 Gold
                    </button>
                </div>
                <div class="questions-container">
                    ${questions.length === 0 ? `
                        <div class="no-questions">
                            <h2>No ${currentLevel} questions yet</h2>
                            <p>Try another level or check back later.</p>
                        </div>
                    ` : questions.map((q, i) => `
                        <div class="question-card ${currentLevel}">
                            <div class="question-header">
                                <span class="question-number">Question ${i + 1}</span>
                            </div>
                            <div class="question-text">${escapeHtml(q.question)}</div>
                            ${q.image ? `<img src="${escapeHtml(q.image)}" alt="Question diagram" class="question-image" onerror="this.style.display='none'">` : ''}
                            <div class="toggle-buttons">
                                <div class="hint-buttons">
                                    ${q.hint ? `<button class="toggle-btn hint-btn" data-index="${i}">💡 Show Hint</button>` : ''}
                                </div>
                                <button class="toggle-btn answer-btn" data-index="${i}">✓ Show Answer</button>
                            </div>
                            ${q.hint ? `
                                <div class="hint-box" id="hint-${i}">
                                    <span class="hint-label">💡 Hint</span>
                                    ${escapeHtml(q.hint)}
                                </div>
                            ` : ''}
                            <div class="answer-box" id="answer-${i}">
                                <span class="answer-label">✓ Answer</span>
                                ${escapeHtml(q.answer)}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            // Add event listeners for level tabs
            document.querySelectorAll('.level-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    currentLevel = tab.dataset.level;
                    render();
                });
            });

            // Add event listeners for hint/answer toggles
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const index = btn.dataset.index;
                    const isHint = btn.classList.contains('hint-btn');
                    const boxId = isHint ? `hint-${index}` : `answer-${index}`;
                    const box = document.getElementById(boxId);
                    
                    btn.classList.toggle('active');
                    box.classList.toggle('visible');
                    
                    btn.textContent = btn.classList.contains('active') 
                        ? (isHint ? '💡 Hide Hint' : '✓ Hide Answer')
                        : (isHint ? '💡 Show Hint' : '✓ Show Answer');
                });
            });
        }

        // Show setup instructions
        function showSetupInstructions() {
            const main = document.getElementById('main-content');
            main.innerHTML = `
                <div class="setup-instructions">
                    <h2>🔧 Setup Required</h2>
                    <p>To connect this page to your Google Sheet:</p>
                    <ol>
                        <li>Open your Google Sheet with questions</li>
                        <li>Make sure it has columns: <code>Date</code>, <code>Level</code>, <code>Question</code>, <code>Answer</code>, <code>Hint</code>, <code>Image URL</code></li>
                        <li>Click <strong>File → Share → Publish to web</strong></li>
                        <li>Select "Entire Document" and "Web page", then click Publish</li>
                        <li>Copy your Sheet ID from the URL (the long string between /d/ and /edit)</li>
                        <li>Edit this HTML file and replace <code>YOUR_SHEET_ID_HERE</code> with your Sheet ID</li>
                    </ol>
                    <p style="margin-top: 1rem; color: var(--text-light);">
                        Example Sheet URL: https://docs.google.com/spreadsheets/d/<strong>1ABC123xyz...</strong>/edit<br>
                        The bold part is your Sheet ID.
                    </p>
                </div>
            `;
        }

        // Show error message
        function showError(message) {
            const main = document.getElementById('main-content');
            main.innerHTML = `
                <div class="error-message">
                    <h2>⚠️ Error Loading Questions</h2>
                    <p>${escapeHtml(message)}</p>
                    <p style="margin-top: 1rem;">Make sure your Google Sheet is published to the web and the Sheet ID is correct.</p>
                </div>
            `;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Navigation handlers
        document.getElementById('prev-day').addEventListener('click', () => {
            currentDate.setDate(currentDate.getDate() - 1);
            render();
        });

        document.getElementById('next-day').addEventListener('click', () => {
            const currentDateStr = getDateKey(currentDate);
            const todayStr = getDateKey(today);
            
            if (currentDateStr < todayStr) {
                currentDate.setDate(currentDate.getDate() + 1);
                render();
            }
        });

        // Initial load
        fetchQuestions();
    </script>
</body>
</html>
